name: Fix enter-chroot (no su) for Adélie

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Patch gen_chroot_script to avoid su(1)
        shell: bash
        run: |
          set -euo pipefail
          f="adelie-chroot-install"

          # Sanity
          test -f "$f"

          # If already patched, exit cleanly
          if grep -q "Adélie rootfs may not have a usable root password" "$f"; then
            echo "Already patched."
            exit 0
          fi

          # Replace the su-based chroot invocation block with a userspec-aware sh-based block.
          perl -0777 -i -pe 's{
            \Q$_sudo mv "$tmpfile" env.sh\E\s*
            \Q$_sudo chroot . /usr/bin/env -i su -l "$user" \\\E\s*
            \Q    sh -c ". /etc/profile 2>/dev/null || true; . /env.sh; cd '\''$oldpwd'\'' 2>/dev/null; \"\$@\"" \\\E\s*
            \Q    -- "${@:-sh}"\E
          }{
            $_sudo mv "$tmpfile" env.sh

\t\t# Adélie rootfs may not have a usable root password / PAM setup for su(1),
\t\t# so prefer entering without su. If the host chroot(8) supports --userspec,
\t\t# we can still honor -u USER.
\t\tif chroot --help 2>/dev/null | grep -q -- \"--userspec\"; then
\t\t    userspec=\"$user\"
\t\t    # If user isn'\''t root, try user:group=user as a reasonable default.
\t\t    if [ \"$user\" != root ]; then
\t\t        userspec=\"$user:$user\"
\t\t    fi
\t\t    $_sudo chroot --userspec=\"$userspec\" . /usr/bin/env -i \\
\t\t        sh -lc \". /etc/profile 2>/dev/null || true; . /env.sh; cd '\''$oldpwd'\'' 2>/dev/null; exec \\\\\\\"\\\\$@\\\\\\\"\" \\
\t\t        -- \"${@:-sh}\"
\t\telse
\t\t    if [ \"$user\" != root ]; then
\t\t        echo \"WARNING: host chroot(8) does not support --userspec; entering as root\" >&2
\t\t    fi
\t\t    $_sudo chroot . /usr/bin/env -i \\
\t\t        sh -lc \". /etc/profile 2>/dev/null || true; . /env.sh; cd '\''$oldpwd'\'' 2>/dev/null; exec \\\\\\\"\\\\$@\\\\\\\"\" \\
\t\t        -- \"${@:-sh}\"
\t\tfi
          }xs' "$f"

          # Make sure it actually changed
          grep -q "Adélie rootfs may not have a usable root password" "$f"

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git add adelie-chroot-install
          git commit -m "enter-chroot: avoid su; use chroot --userspec when available"
          git push
